<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدول | الضحي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="admin-sidebar__brand"><i class="fas fa-leaf"></i><span>إدارة الضحي</span></div>
            <nav class="admin-sidebar__nav">
                <div class="admin-sidebar__section">رئيسي</div>
                <a href="dashboard-ar.html" class="admin-sidebar__item"><i class="fas fa-chart-pie"></i>لوحة التحكم</a>
                <a href="products-ar.html" class="admin-sidebar__item"><i class="fas fa-seedling"></i>المنتجات</a>
                <a href="rfqs-ar.html" class="admin-sidebar__item"><i class="fas fa-file-invoice"></i>طلبات العروض</a>
                <a href="countries-ar.html" class="admin-sidebar__item active"><i class="fas fa-globe-africa"></i>الدول</a>
                <a href="certifications-ar.html" class="admin-sidebar__item"><i class="fas fa-certificate"></i>الشهادات</a>
                <div class="admin-sidebar__section">الموقع</div>
                <a href="../index-ar.html" class="admin-sidebar__item" target="_blank"><i class="fas fa-external-link-alt"></i>عرض الموقع</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-topbar">
                <button class="admin-topbar__toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                <div class="admin-topbar__user"><div class="admin-topbar__avatar">م</div><span class="admin-topbar__name">المستخدم المسؤول</span></div>
            </header>

            <div class="admin-content">
                <div class="admin-card">
                    <div class="admin-card__header">
                        <h5 class="admin-card__title">الأسواق التصديرية</h5>
                        <button class="admin-btn admin-btn--primary" data-bs-toggle="modal" data-bs-target="#countryModal">
                            <i class="fas fa-plus me-1"></i>إضافة دولة
                        </button>
                    </div>
                    <div class="admin-card__body p-0">
                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead>
                                    <tr><th>العلم</th><th>الدولة</th><th>المنطقة</th><th>الحالة</th><th>الإجراءات</th></tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>🇸🇦</td>
                                        <td>السعودية</td>
                                        <td>الشرق الأوسط</td>
                                        <td><span class="badge badge--won">نشط</span></td>
                                        <td>
                                            <button class="admin-btn admin-btn--sm admin-btn--outline"><i class="fas fa-edit"></i></button>
                                            <button class="admin-btn admin-btn--sm admin-btn--danger"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>🇦🇪</td>
                                        <td>الإمارات</td>
                                        <td>الشرق الأوسط</td>
                                        <td><span class="badge badge--won">نشط</span></td>
                                        <td>
                                            <button class="admin-btn admin-btn--sm admin-btn--outline"><i class="fas fa-edit"></i></button>
                                            <button class="admin-btn admin-btn--sm admin-btn--danger"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>🇩🇪</td>
                                        <td>ألمانيا</td>
                                        <td>أوروبا</td>
                                        <td><span class="badge badge--won">نشط</span></td>
                                        <td>
                                            <button class="admin-btn admin-btn--sm admin-btn--outline"><i class="fas fa-edit"></i></button>
                                            <button class="admin-btn admin-btn--sm admin-btn--danger"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade admin-modal" id="countryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">إضافة دولة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="admin-form-label">اسم الدولة</label>
                        <input type="text" class="admin-form-control" placeholder="مثال: فرنسا">
                    </div>
                    <div class="mb-3">
                        <label class="admin-form-label">المنطقة</label>
                        <select class="admin-form-select">
                            <option>الشرق الأوسط</option>
                            <option>أوروبا</option>
                            <option>أمريكا الشمالية</option>
                            <option>آسيا والمحيط الهادئ</option>
                            <option>أفريقيا</option>
                            <option>أمريكا الجنوبية</option>
                            <option>أوقيانوسيا</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="admin-btn admin-btn--outline" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="admin-btn admin-btn--primary">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle')?.addEventListener('click', () => {
            document.getElementById('adminSidebar').classList.toggle('open');
        });
    </script>
    <script src="../assets/js/lang-switcher.js"></script>
</body>
</html>
