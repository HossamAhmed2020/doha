<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries | Al Doha Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="admin-sidebar__brand"><i class="fas fa-leaf"></i><span>Al Doha Admin</span></div>
            <nav class="admin-sidebar__nav">
                <div class="admin-sidebar__section">Main</div>
                <a href="dashboard.html" class="admin-sidebar__item"><i class="fas fa-chart-pie"></i>Dashboard</a>
                <a href="products.html" class="admin-sidebar__item"><i class="fas fa-seedling"></i>Products</a>
                <a href="rfqs.html" class="admin-sidebar__item"><i class="fas fa-file-invoice"></i>RFQs</a>
                <a href="countries.html" class="admin-sidebar__item active"><i class="fas fa-globe-africa"></i>Countries</a>
                <a href="certifications.html" class="admin-sidebar__item"><i class="fas fa-certificate"></i>Certifications</a>
                <div class="admin-sidebar__section">Website</div>
                <a href="../index.html" class="admin-sidebar__item" target="_blank"><i class="fas fa-external-link-alt"></i>View Site</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-topbar">
                <button class="admin-topbar__toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                <div class="admin-topbar__user"><div class="admin-topbar__avatar">AD</div><span class="admin-topbar__name">Admin User</span></div>
            </header>

            <div class="admin-content">
                <div class="admin-card">
                    <div class="admin-card__header">
                        <h5 class="admin-card__title">Export Markets</h5>
                        <button class="admin-btn admin-btn--primary" data-bs-toggle="modal" data-bs-target="#countryModal">
                            <i class="fas fa-plus me-1"></i>Add Country
                        </button>
                    </div>
                    <div class="admin-card__body p-0">
                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead>
                                    <tr><th>Flag</th><th>Country</th><th>Region</th><th>Status</th><th>Actions</th></tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>🇸🇦</td>
                                        <td>Saudi Arabia</td>
                                        <td>Middle East</td>
                                        <td><span class="badge badge--won">Active</span></td>
                                        <td>
                                            <button class="admin-btn admin-btn--sm admin-btn--outline"><i class="fas fa-edit"></i></button>
                                            <button class="admin-btn admin-btn--sm admin-btn--danger"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>🇦🇪</td>
                                        <td>UAE</td>
                                        <td>Middle East</td>
                                        <td><span class="badge badge--won">Active</span></td>
                                        <td>
                                            <button class="admin-btn admin-btn--sm admin-btn--outline"><i class="fas fa-edit"></i></button>
                                            <button class="admin-btn admin-btn--sm admin-btn--danger"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>🇩🇪</td>
                                        <td>Germany</td>
                                        <td>Europe</td>
                                        <td><span class="badge badge--won">Active</span></td>
                                        <td>
                                            <button class="admin-btn admin-btn--sm admin-btn--outline"><i class="fas fa-edit"></i></button>
                                            <button class="admin-btn admin-btn--sm admin-btn--danger"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade admin-modal" id="countryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Country</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="admin-form-label">Country Name</label>
                        <input type="text" class="admin-form-control" placeholder="e.g. France">
                    </div>
                    <div class="mb-3">
                        <label class="admin-form-label">Region</label>
                        <select class="admin-form-select">
                            <option>Middle East</option>
                            <option>Europe</option>
                            <option>North America</option>
                            <option>Asia Pacific</option>
                            <option>Africa</option>
                            <option>South America</option>
                            <option>Oceania</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="admin-btn admin-btn--outline" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="admin-btn admin-btn--primary">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle')?.addEventListener('click', () => {
            document.getElementById('adminSidebar').classList.toggle('open');
        });
    </script>
    <script src="../assets/js/lang-switcher.js"></script>
</body>
</html>
