<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشهادات | الضحي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="admin-sidebar__brand"><i class="fas fa-globe"></i><span>إدارة الضحي</span></div>
            <nav class="admin-sidebar__nav">
                <div class="admin-sidebar__section">رئيسي</div>
                <a href="dashboard-ar.html" class="admin-sidebar__item"><i class="fas fa-chart-pie"></i>لوحة التحكم</a>
                <a href="products-ar.html" class="admin-sidebar__item"><i class="fas fa-box"></i>المنتجات</a>
                <a href="rfqs-ar.html" class="admin-sidebar__item"><i class="fas fa-file-invoice"></i>طلبات العروض</a>
                <a href="countries-ar.html" class="admin-sidebar__item"><i class="fas fa-globe"></i>الدول</a>
                <a href="certifications-ar.html" class="admin-sidebar__item active"><i class="fas fa-certificate"></i>الشهادات</a>
                <div class="admin-sidebar__section">الموقع</div>
                <a href="../index-ar.html" class="admin-sidebar__item" target="_blank"><i class="fas fa-external-link-alt"></i>عرض الموقع</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-topbar">
                <button class="admin-topbar__toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                <div class="admin-topbar__user"><div class="admin-topbar__avatar">م</div><span class="admin-topbar__name">المستخدم المسؤول</span></div>
            </header>

            <div class="admin-content">
                <div class="admin-card">
                    <div class="admin-card__header">
                        <h5 class="admin-card__title">الشهادات</h5>
                        <button class="admin-btn admin-btn--primary" data-bs-toggle="modal" data-bs-target="#certModal">
                            <i class="fas fa-plus me-1"></i>إضافة شهادة
                        </button>
                    </div>
                    <div class="admin-card__body p-0">
                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead>
                                    <tr><th>الأيقونة</th><th>الاسم</th><th>الوصف</th><th>الحالة</th><th>الإجراءات</th></tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><i class="fas fa-certificate text-green"></i></td>
                                        <td>ISO 9001</td>
                                        <td>إدارة الجودة</td>
                                        <td><span class="badge badge--won">نشط</span></td>
                                        <td>
                                            <button class="admin-btn admin-btn--sm admin-btn--outline"><i class="fas fa-edit"></i></button>
                                            <button class="admin-btn admin-btn--sm admin-btn--danger"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td><i class="fas fa-leaf text-green"></i></td>
                                        <td>ISO 14001</td>
                                        <td>الإدارة البيئية</td>
                                        <td><span class="badge badge--won">نشط</span></td>
                                        <td>
                                            <button class="admin-btn admin-btn--sm admin-btn--outline"><i class="fas fa-edit"></i></button>
                                            <button class="admin-btn admin-btn--sm admin-btn--danger"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td><i class="fas fa-utensils text-green"></i></td>
                                        <td>HACCP</td>
                                        <td>سلامة الغذاء</td>
                                        <td><span class="badge badge--won">نشط</span></td>
                                        <td>
                                            <button class="admin-btn admin-btn--sm admin-btn--outline"><i class="fas fa-edit"></i></button>
                                            <button class="admin-btn admin-btn--sm admin-btn--danger"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade admin-modal" id="certModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">إضافة شهادة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="admin-form-label">اسم الشهادة</label>
                        <input type="text" class="admin-form-control" placeholder="مثال: ISO 22000">
                    </div>
                    <div class="mb-3">
                        <label class="admin-form-label">الوصف</label>
                        <input type="text" class="admin-form-control" placeholder="وصف مختصر">
                    </div>
                    <div class="mb-3">
                        <label class="admin-form-label">فئة الأيقونة</label>
                        <input type="text" class="admin-form-control" placeholder="fas fa-award">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="admin-btn admin-btn--outline" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="admin-btn admin-btn--primary">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle')?.addEventListener('click', () => {
            document.getElementById('adminSidebar').classList.toggle('open');
        });
    </script>
    <script src="../assets/js/lang-switcher.js"></script>
</body>
</html>
</html>
